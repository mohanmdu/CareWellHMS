<h2 mat-dialog-title>{{ isEdit ? 'Edit' : 'Add' }} OP Billing Component</h2>

<mat-dialog-content class="op-billing-component-dialog-content">
  <div class="hms-form-grid">
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Category</mat-label>
      <mat-select [(ngModel)]="form.categoryId" name="categoryId" required>
        @for (category of categories; track category.id) {
          <mat-option [value]="category.id">{{ category.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Component Name</mat-label>
      <input matInput [(ngModel)]="form.name" name="name" required />
    </mat-form-field>
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Amount</mat-label>
      <input matInput type="number" min="0" [(ngModel)]="form.amount" name="amount" required />
    </mat-form-field>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" mat-dialog-close>Cancel</button>
  <button mat-flat-button color="primary" type="button" [disabled]="!isValid" (click)="submit()">
    {{ isEdit ? 'Save' : 'Add' }}
  </button>
</mat-dialog-actions>
