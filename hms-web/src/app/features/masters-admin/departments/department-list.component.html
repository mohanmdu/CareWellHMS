<section>
  <h2>Departments</h2>

  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }

  <form (ngSubmit)="add()">
    <input name="newDepartmentName" [(ngModel)]="newDepartmentName" placeholder="New department name" required />
    <button type="submit">Add</button>
  </form>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Status</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      @for (department of departments(); track department.id) {
        <tr>
          <td>{{ department.name }}</td>
          <td>{{ department.active ? 'Active' : 'Inactive' }}</td>
          <td>
            @if (department.active) {
              <button type="button" (click)="deactivate(department)">Deactivate</button>
            }
          </td>
        </tr>
      }
    </tbody>
  </table>
</section>
