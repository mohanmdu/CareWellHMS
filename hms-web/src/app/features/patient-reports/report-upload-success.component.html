<div class="hms-page rus-page">
  @if (loading()) {
    <mat-progress-bar mode="indeterminate" />
  }

  @if (!loading() && report(); as r) {
    <section class="hms-card-surface rus-card">
      <h1 class="rus-banner">Success</h1>
      <p class="rus-message">
        Medical Report for {{ r.patientName }} - {{ r.patientRegistrationNumber }} has been uploaded successfully...
      </p>
    </section>
  }
</div>
