<div class="hms-page">
  <app-page-header title="Patient Registration Logs" subtitle="Audit trail of every register, update, delete, restore and permanent delete." />

  <section class="hms-card-surface patient-logs-section">
    @if (loading()) {
      <mat-progress-bar mode="indeterminate" />
    }

    @if (!loading() && logs().length === 0) {
      <app-empty-state icon="history" title="No activity yet" message="Patient registration operations will appear here." />
    } @else if (logs().length > 0) {
      <table mat-table [dataSource]="logs()" class="patient-logs-table">
        <ng-container matColumnDef="serialNo">
          <th mat-header-cell *matHeaderCellDef>S.No</th>
          <td mat-cell *matCellDef="let log; let i = index">{{ i + 1 }}</td>
        </ng-container>

        <ng-container matColumnDef="operation">
          <th mat-header-cell *matHeaderCellDef>Operation</th>
          <td mat-cell *matCellDef="let log">
            <app-status-badge [label]="log.operation" [tone]="operationTone[log.operation]" />
          </td>
        </ng-container>

        <ng-container matColumnDef="patientName">
          <th mat-header-cell *matHeaderCellDef>Patient Name</th>
          <td mat-cell *matCellDef="let log">{{ log.patientName }}</td>
        </ng-container>

        <ng-container matColumnDef="performedAt">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let log">{{ log.performedAt | date: 'medium' }}</td>
        </ng-container>

        <ng-container matColumnDef="performedBy">
          <th mat-header-cell *matHeaderCellDef>Created By</th>
          <td mat-cell *matCellDef="let log">{{ log.performedBy }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    }
  </section>
</div>
