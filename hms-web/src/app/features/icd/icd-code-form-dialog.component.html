<h2 mat-dialog-title>{{ isEdit ? 'Edit ICD Code' : 'Add ICD Code' }}</h2>
<mat-dialog-content class="icd-code-form">
  <mat-form-field appearance="outline">
    <mat-label>ICD Version</mat-label>
    <mat-select [(ngModel)]="form.version" [disabled]="isEdit">
      @for (v of icdVersions; track v) {
        <mat-option [value]="v">{{ v === 'ICD_10' ? 'ICD-10' : 'ICD-11' }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>ICD Code</mat-label>
    <input matInput [(ngModel)]="form.code" [disabled]="isEdit" placeholder="e.g. J18.9" />
  </mat-form-field>

  <mat-form-field appearance="outline" class="icd-full-width">
    <mat-label>Disease Name</mat-label>
    <input matInput [(ngModel)]="form.diseaseName" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Chapter</mat-label>
    <input matInput [(ngModel)]="form.chapter" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Category</mat-label>
    <input matInput [(ngModel)]="form.category" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>WHO Version</mat-label>
    <input matInput [(ngModel)]="form.whoVersion" placeholder="e.g. ICD-10 2019" />
  </mat-form-field>

  <mat-form-field appearance="outline" class="icd-full-width">
    <mat-label>Short Description</mat-label>
    <textarea matInput rows="2" [(ngModel)]="form.shortDescription"></textarea>
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-flat-button color="primary" type="button" [disabled]="!isValid" (click)="submit()">Save</button>
</mat-dialog-actions>
