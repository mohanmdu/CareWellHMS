<div class="hms-page">
  @if (loading()) {
    <mat-progress-bar mode="indeterminate" />
  }

  @if (!loading() && admission(); as admission) {
    <div class="admission-success-layout">
      <button mat-flat-button color="primary" type="button" routerLink="/ip/admissions" class="admission-success-back">
        Inpatient List
      </button>

      <section class="admission-success-banner">
        <header class="admission-success-title">Message</header>
        <div class="admission-success-message">
          The Patient <strong>{{ admission.patientName }}</strong> (In-Patient ID: <strong>{{ admission.admissionNumber }}</strong>)
          has been admitted as In-Patient in <strong>{{ admission.roomTypeName }} - {{ admission.roomNumber }}</strong>.
        </div>
      </section>
    </div>
  }
</div>
