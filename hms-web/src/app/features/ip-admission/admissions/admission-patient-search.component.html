<div class="hms-page">
  <app-page-header title="Patient Search Information" subtitle="Search an existing patient to begin a new IP admission, or register a new patient.">
    <button mat-flat-button color="primary" type="button" (click)="newPatient()">
      <mat-icon aria-hidden="true">person_add</mat-icon>
      New Patient
    </button>
  </app-page-header>

  <section class="hms-card-surface admission-search-section">
    <app-patient-search (patientSelected)="selectPatient($event)" />
  </section>

  <section class="hms-card-surface admission-request-section">
    <h2 class="admission-request-title">Patient IP Request From Consultant</h2>
    <table mat-table [dataSource]="[]" class="admission-request-table">
      <ng-container matColumnDef="patientId">
        <th mat-header-cell *matHeaderCellDef>Patient ID</th>
        <td mat-cell *matCellDef="let row"></td>
      </ng-container>
      <ng-container matColumnDef="patientName">
        <th mat-header-cell *matHeaderCellDef>Patient Name</th>
        <td mat-cell *matCellDef="let row"></td>
      </ng-container>
      <ng-container matColumnDef="mobile">
        <th mat-header-cell *matHeaderCellDef>Mobile</th>
        <td mat-cell *matCellDef="let row"></td>
      </ng-container>
      <ng-container matColumnDef="address">
        <th mat-header-cell *matHeaderCellDef>Address</th>
        <td mat-cell *matCellDef="let row"></td>
      </ng-container>
      <ng-container matColumnDef="view">
        <th mat-header-cell *matHeaderCellDef>View</th>
        <td mat-cell *matCellDef="let row"></td>
      </ng-container>
      <ng-container matColumnDef="cancel">
        <th mat-header-cell *matHeaderCellDef>Cancel</th>
        <td mat-cell *matCellDef="let row"></td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="requestColumns"></tr>
    </table>
    <app-empty-state icon="inbox" title="No pending requests" message="Requests from consultants will appear here." />
  </section>
</div>
