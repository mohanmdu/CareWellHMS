<div class="hms-page">
  @if (loading()) {
    <mat-progress-bar mode="indeterminate" />
  }

  @if (!loading() && admission(); as admission) {
    <div class="admission-success-layout">
      <button mat-flat-button color="primary" type="button" routerLink="/ip/admissions/new" class="admission-success-back">
        Back
      </button>

      <section class="admission-success-banner">
        <header class="admission-success-title">Inpatient Registration Success</header>
        <div class="admission-success-message">
          The Patient <strong>{{ admission.patientName }}</strong> has been registered with the IPID
          <strong>{{ admission.admissionNumber }}</strong> successfully.
        </div>
      </section>
    </div>
  }
</div>
