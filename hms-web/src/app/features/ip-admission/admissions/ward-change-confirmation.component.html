<div class="hms-page">
  <div class="admission-success-layout">
    <button mat-flat-button color="primary" type="button" (click)="back()" class="admission-success-back">
      Inpatient List
    </button>

    <section class="admission-success-banner">
      <header class="admission-success-title">Message</header>
      <div class="admission-success-message">
        The Patient <strong>{{ patientName() }}</strong> has been ward Changed from <strong>{{ fromWard() }}</strong> to
        <strong>{{ toWard() }}</strong>
      </div>
    </section>
  </div>
</div>
