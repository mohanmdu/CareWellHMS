<h2 mat-dialog-title>Changes - {{ log.operation }}</h2>

<mat-dialog-content class="changes-dialog-content">
  @if (rows.length === 0) {
    <p>No field-level changes recorded for this entry.</p>
  } @else {
    <table mat-table [dataSource]="rows" class="changes-table">
      <ng-container matColumnDef="field">
        <th mat-header-cell *matHeaderCellDef>Field</th>
        <td mat-cell *matCellDef="let row">{{ row.field }}</td>
      </ng-container>
      <ng-container matColumnDef="before">
        <th mat-header-cell *matHeaderCellDef>Before</th>
        <td mat-cell *matCellDef="let row">{{ row.before }}</td>
      </ng-container>
      <ng-container matColumnDef="after">
        <th mat-header-cell *matHeaderCellDef>After</th>
        <td mat-cell *matCellDef="let row">{{ row.after }}</td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-flat-button color="primary" type="button" mat-dialog-close>Close</button>
</mat-dialog-actions>
