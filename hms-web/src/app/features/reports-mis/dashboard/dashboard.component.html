<div class="hms-page">
  <app-page-header title="MIS Dashboard" subtitle="Cross-module snapshot of today's hospital activity." />

  @if (loading()) {
    <mat-progress-bar mode="indeterminate" />
  }

  @if (dashboard(); as d) {
    <div class="dashboard-grid">
      <app-stat-tile icon="groups" [value]="d.totalPatients" label="Total Patients" tone="primary" />
      <app-stat-tile icon="local_hospital" [value]="d.activeAdmissions" label="Active Admissions" tone="info" />
      <app-stat-tile icon="event" [value]="d.todaysAppointments" label="Today's Appointments" tone="primary" />
      <app-stat-tile icon="payments" [value]="d.totalOpRevenue" label="OP Revenue (Paid)" tone="success" />
      <app-stat-tile icon="medication" [value]="d.totalPharmacyRevenue" label="Pharmacy Revenue" tone="success" />
      <app-stat-tile
        icon="health_and_safety"
        [value]="d.pendingInsuranceClaims"
        label="Pending Insurance Claims"
        tone="warning"
      />
    </div>
  }
</div>
