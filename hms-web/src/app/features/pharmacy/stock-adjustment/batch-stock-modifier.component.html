<div class="batch-modifier-tab-body">
  <section class="batch-modifier-filters">
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Batch No</mat-label>
      <input matInput [(ngModel)]="batchNo" />
    </mat-form-field>
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Drug Name</mat-label>
      <input matInput [(ngModel)]="drugName" placeholder="Enter the Name" />
    </mat-form-field>
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Modification Type</mat-label>
      <mat-select [(ngModel)]="modificationType">
        <mat-option value="PACKING_QTY">Change Packing &amp; Qty</mat-option>
        <mat-option value="MRP">Change MRP</mat-option>
      </mat-select>
    </mat-form-field>
    <button mat-flat-button color="primary" type="button" (click)="getStock()">Get Stock</button>
  </section>

  @if (loading()) {
    <mat-progress-bar mode="indeterminate" />
  }

  @if (searched()) {
    <section class="batch-modifier-results">
      <h3>Product Details</h3>
      @if (results().length === 0) {
        <app-empty-state icon="inventory_2" title="No matching batches" message="Try a different Batch No or Drug Name." />
      } @else {
        <table mat-table [dataSource]="results()" class="batch-modifier-table">
          <ng-container matColumnDef="productName">
            <th mat-header-cell *matHeaderCellDef>Drug Name</th>
            <td mat-cell *matCellDef="let stock">{{ stock.productName }}</td>
          </ng-container>
          <ng-container matColumnDef="productTypeName">
            <th mat-header-cell *matHeaderCellDef>Drug Type</th>
            <td mat-cell *matCellDef="let stock">{{ stock.productTypeName }}</td>
          </ng-container>
          <ng-container matColumnDef="batch">
            <th mat-header-cell *matHeaderCellDef>Batch</th>
            <td mat-cell *matCellDef="let stock">{{ stock.batch }}</td>
          </ng-container>
          <ng-container matColumnDef="packingQty">
            <th mat-header-cell *matHeaderCellDef>Qty / Qty per Pack</th>
            <td mat-cell *matCellDef="let stock">
              <div class="batch-modifier-inline-fields">
                <mat-form-field appearance="outline" subscriptSizing="dynamic" class="batch-modifier-narrow-field">
                  <input matInput type="number" [(ngModel)]="editValues[stock.id].quantityOnHand" />
                </mat-form-field>
                <mat-form-field appearance="outline" subscriptSizing="dynamic" class="batch-modifier-narrow-field">
                  <input matInput type="number" [(ngModel)]="editValues[stock.id].packing" />
                </mat-form-field>
              </div>
            </td>
          </ng-container>
          <ng-container matColumnDef="mrp">
            <th mat-header-cell *matHeaderCellDef>MRP</th>
            <td mat-cell *matCellDef="let stock">
              <mat-form-field appearance="outline" subscriptSizing="dynamic" class="batch-modifier-narrow-field">
                <input matInput type="number" [(ngModel)]="editValues[stock.id].mrp" />
              </mat-form-field>
            </td>
          </ng-container>
          <ng-container matColumnDef="update">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let stock">
              <button mat-flat-button color="primary" type="button" (click)="update(stock)">Update</button>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      }
    </section>
  }
</div>
