<h2 mat-dialog-title>{{ isEdit ? 'Edit' : 'Add' }} Supplier</h2>

<mat-dialog-content class="supplier-dialog-content">
  <div class="hms-form-grid">
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Supplier Name</mat-label>
      <input matInput [(ngModel)]="form.name" name="name" required />
    </mat-form-field>
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Contact Person Name</mat-label>
      <input matInput [(ngModel)]="form.contactPersonName" name="contactPersonName" />
    </mat-form-field>
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Mobile Number</mat-label>
      <input
        matInput
        name="mobileNumber"
        inputmode="numeric"
        maxlength="10"
        [ngModel]="form.mobileNumber"
        (input)="onMobileInput($event)"
        required
      />
      @if (form.mobileNumber && form.mobileNumber.length !== 10) {
        <mat-hint>Must be exactly 10 digits</mat-hint>
      }
    </mat-form-field>
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Address</mat-label>
      <input matInput [(ngModel)]="form.address" name="address" required />
    </mat-form-field>
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>City</mat-label>
      <input matInput [(ngModel)]="form.city" name="city" />
    </mat-form-field>
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Landline Number</mat-label>
      <input matInput [(ngModel)]="form.landlineNumber" name="landlineNumber" />
    </mat-form-field>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" mat-dialog-close>Cancel</button>
  <button mat-flat-button color="primary" type="button" [disabled]="!isValid" (click)="submit()">
    {{ isEdit ? 'Save' : 'Add' }}
  </button>
</mat-dialog-actions>
