<div class="po-list-tab-body">
  @if (loading()) {
    <mat-progress-bar mode="indeterminate" />
  }

  @if (!loading() && entries().length === 0) {
    <app-empty-state icon="fact_check" title="No approved purchase orders" message="Approved POs will appear here." />
  } @else if (entries().length > 0) {
    <table mat-table [dataSource]="entries()" class="po-list-table">
      <ng-container matColumnDef="poNumber">
        <th mat-header-cell *matHeaderCellDef>PO No</th>
        <td mat-cell *matCellDef="let entry">{{ entry.poNumber }}</td>
      </ng-container>
      <ng-container matColumnDef="supplierName">
        <th mat-header-cell *matHeaderCellDef>Supplier Name</th>
        <td mat-cell *matCellDef="let entry">{{ entry.supplierName }}</td>
      </ng-container>
      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef>Date &amp; Time</th>
        <td mat-cell *matCellDef="let entry">{{ entry.createdAt | date: 'dd-MM-yyyy HH:mm' }}</td>
      </ng-container>
      <ng-container matColumnDef="createdBy">
        <th mat-header-cell *matHeaderCellDef>Created By</th>
        <td mat-cell *matCellDef="let entry">{{ entry.createdBy }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="po-list-actions-header"></th>
        <td mat-cell *matCellDef="let entry" class="po-list-actions-cell">
          <button mat-stroked-button color="primary" type="button" (click)="view(entry)">View</button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  }
</div>
