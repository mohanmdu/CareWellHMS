<h2 mat-dialog-title>View GRN</h2>

<mat-dialog-content class="grn-view-dialog-content">
  <app-grn-form [readonly]="true" [grnId]="grnId" />
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-flat-button color="primary" type="button" (click)="close()">Close</button>
</mat-dialog-actions>
