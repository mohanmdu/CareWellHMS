<div class="grn-list-tab-body">
  @if (loading()) {
    <mat-progress-bar mode="indeterminate" />
  }

  @if (!loading() && entries().length === 0) {
    <app-empty-state icon="inventory" title="No approved GRNs yet" message="GRNs you approve will appear here." />
  } @else if (entries().length > 0) {
    <table mat-table [dataSource]="entries()" class="grn-list-table">
      <ng-container matColumnDef="supplierName">
        <th mat-header-cell *matHeaderCellDef>Supplier Name</th>
        <td mat-cell *matCellDef="let entry">{{ entry.supplierName }}</td>
      </ng-container>
      <ng-container matColumnDef="invoiceNo">
        <th mat-header-cell *matHeaderCellDef>Invoice No</th>
        <td mat-cell *matCellDef="let entry">{{ entry.invoiceNo }}</td>
      </ng-container>
      <ng-container matColumnDef="grnDate">
        <th mat-header-cell *matHeaderCellDef>GRN Date</th>
        <td mat-cell *matCellDef="let entry">{{ entry.grnDate }}</td>
      </ng-container>
      <ng-container matColumnDef="grnAmount">
        <th mat-header-cell *matHeaderCellDef>GRN Amount</th>
        <td mat-cell *matCellDef="let entry">{{ entry.grnAmount | number: '1.2-2' }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let entry">{{ entry.status }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="grn-list-actions-header"></th>
        <td mat-cell *matCellDef="let entry" class="grn-list-actions-cell">
          <button mat-stroked-button color="primary" type="button" (click)="view(entry)">View</button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  }
</div>
