spring.application.name=hms-api

# --- Datasource (same logical MySQL schema as the legacy app during Phase 2 strangler-fig rollout) ---
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/Navjeevan?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}

# --- JPA / Hibernate ---
# ddl-auto is intentionally 'validate', not 'update' (see migration doc R3) - Flyway owns schema changes.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# --- Security (interim HTTP Basic for local dev; replace with JWT per migration plan Phase 1) ---
app.security.dev-user=${DEV_USER:admin}
app.security.dev-password=${DEV_PASSWORD:admin}

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
